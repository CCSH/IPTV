name: Logo Update
env:
  TZ: Asia/Shanghai
  LOGO_DIR: "logo"
  FILE_EXT: "png"
  MIN_FILE_SIZE: "1k"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5'
jobs:
  sync-logo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 初始化logo目录
        run: mkdir -p "$LOGO_DIR" && chmod 755 "$LOGO_DIR"

      - name: 同步Logo文件
        run: |
          set -euo pipefail
          REPOS=(
            "https://github.com/sparkssssssssss/epg.git|logo|spark-epg"
            "https://github.com/fanmingming/live.git|tv|fanmingming-live"
          )
          for REPO in "${REPOS[@]}"; do
            IFS='|' read -r URL DIR TAG <<< "$REPO"
            TEMP_DIR="temp_$TAG"
            echo "处理仓库：$TAG"
            git clone --depth 1 --sparse --filter=blob:none "$URL" "$TEMP_DIR" 2>/dev/null || { echo "克隆失败，跳过"; continue; }
            cd "$TEMP_DIR" && git sparse-checkout set "$DIR" 2>/dev/null || { cd ..; rm -rf "$TEMP_DIR"; echo "目录不存在，跳过"; continue; }
            cd ..
            find "$TEMP_DIR/$DIR" -name "*.$FILE_EXT" -type f -size +"$MIN_FILE_SIZE" -print0 | while IFS= read -r -d '' PNG_FILE; do
              cp -f "$PNG_FILE" "$LOGO_DIR/"
            done
            rm -rf "$TEMP_DIR"
          done
          find "$LOGO_DIR" -type f -name "*.$FILE_EXT" ! -size +"$MIN_FILE_SIZE" -delete

      - name: 强制提交推送
        run: |
          set -euo pipefail
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -z "$(ls -A "$LOGO_DIR"/*.$FILE_EXT 2>/dev/null)" ]; then
            echo "ℹ️ 无有效Logo文件，跳过提交推送"
            exit 0
          fi
          
          git pull origin main --rebase --autostash 2>/dev/null || true
          git add -f "$LOGO_DIR/"/*.$FILE_EXT
          
          if git diff --cached --quiet; then
            echo "ℹ️ Logo文件无新增/更新，跳过提交推送"
            exit 0
          fi
          
          git commit -m "Logo Update: $(date +'%Y-%m-%d') (CST)"
          git push origin main -f
          echo "✅ 推送成功！已新增/更新logo，旧logo已保留"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理临时文件
        if: always()
        run: rm -rf temp_* 2>/dev/null
