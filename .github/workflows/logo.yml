name: Logo Update

on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间8点自动同步（可选）

jobs:
  sync-multi-repos:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出自己的仓库
      - name: 检出本仓库
        uses: actions/checkout@v4

      # 2. 创建logo目录
      - name: 创建logo目录
        run: mkdir -p logo

      # 3. 同步的多仓库列表 + 循环下载PNG
      - name: 循环同步多仓库PNG文件
        run: |
          # ========== 配置要克隆的仓库列表 ==========
          # 格式："仓库地址|目标目录|自定义标识"
          REPOS=(
            "https://github.com/fanmingming/live.git|tv|fanmingming-live"
            "https://github.com/sparkssssssssss/epg.git|logo|spark-epg"
          )

          # 循环克隆每个仓库并复制PNG
          for REPO in "${REPOS[@]}"; do
            # 拆分配置
            REPO_URL=$(echo "$REPO" | cut -d'|' -f1)
            TARGET_DIR=$(echo "$REPO" | cut -d'|' -f2)
            REPO_TAG=$(echo "$REPO" | cut -d'|' -f3)
            
            echo -e "\n===== 处理仓库：$REPO_TAG ====="
            # 克隆仓库（浅克隆，只拉最新版本，速度快）
            git clone --depth 1 "$REPO_URL" "temp_$REPO_TAG"
            
            # 递归查找所有PNG文件，复制到logo目录（已存在则跳过）
            find "temp_$REPO_TAG/$TARGET_DIR" -name "*.png" -type f | while read -r PNG_FILE; do
              FILENAME=$(basename "$PNG_FILE")
              if [ -f "logo/$FILENAME" ]; then
                echo "⚠️ $FILENAME 已存在，跳过"
              else
                cp "$PNG_FILE" logo/
                echo "✅ 复制：$FILENAME"
              fi
            done
            
            # 删除临时仓库，节省空间
            rm -rf "temp_$REPO_TAG"
          done

      # 4. 提交并推送同步后的文件到自己的仓库
      - name: 提交并推送变更
        run: |
          # 配置git用户信息
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查logo目录是否有文件变更
          if git status --porcelain | grep -q "logo/"; then
            git add logo/*
            git commit -m "Logo Update: $(date +'%Y-%m-%d')"
            git push
            echo "✅ 所有仓库PNG文件同步完成！"
          else
            echo "ℹ️ 没有新的PNG文件需要同步"
          fi
