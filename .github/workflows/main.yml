name: 'Live Update'
on:
  schedule:
    - cron: '0 20 * * *'  # 北京时间次日4点执行（UTC+8）
  workflow_dispatch:      # 手动触发

jobs:
  run_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 【修改1：核心】添加写权限，允许Git推送代码
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 【修改2：优化】拉取完整仓库历史，避免rebase冲突

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 【优化】缓存pip依赖，加快下次运行速度

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencc-python-reimplemented

      - name: Run Python script
        run: |
          rm -f live.txt live.m3u live_lite.txt live_lite.m3u others.txt  # 清理旧文件
          python main.py

      - name: 配置Git并暂存文件
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add live.txt live.m3u live_lite.txt live_lite.m3u others.txt

      - name: 提交并推送变更
        run: |
          if git diff --cached --quiet; then
            echo "ℹ️ 无直播文件修改，跳过提交推送"
          else
            git commit -m "Live Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') (CST)"
            git pull --rebase origin main --autostash || true  # 【修改3：优化】自动暂存本地变更，避免rebase失败
            git push origin main -f  # 【修改4：优化】强制推送，解决rebase后分支不一致问题
            echo "✅ 直播文件更新并推送完成"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
