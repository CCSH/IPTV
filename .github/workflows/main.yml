name: 'Live Update'
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  run_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 核心写权限，必须保留
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免rebase冲突

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencc-python-reimplemented

      - name: Run Python script
        run: |
          rm -f live.txt live.m3u live_lite.txt live_lite.m3u others.txt
          python main.py

      - name: 配置Git并暂存文件
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add live.txt live.m3u live_lite.txt live_lite.m3u others.txt

      - name: 提交并推送变更
        run: |
          if git diff --cached --quiet; then
            echo "ℹ️ 无直播文件修改，跳过提交推送"
          else
            git commit -m "Live Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') (CST)"
            git pull --rebase origin main --autostash || true
            git push origin main -f
            echo "✅ 直播文件更新并推送完成"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
