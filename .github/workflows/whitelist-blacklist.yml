name: 'WhiteList BlackList'

on:
  schedule:
    - cron: '0 16 * * 4' # UTC
  workflow_dispatch:

jobs:
  run_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencc-python-reimplemented

      - name: Run Python script
        run: |
          # 删除子目录下的旧文件，不存在不报错，避免内容残留
          rm -f ./assets/whitelist-blacklist/*
          # 执行子目录下的Python脚本生成新文件
          python assets/whitelist-blacklist/main.py

      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add ./assets/whitelist-blacklist/*
          git commit -m "黑白名单 Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d) (CST)"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
