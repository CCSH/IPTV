name: EPG Update
on:
  schedule:
    - cron: '30 16,20,0,4,8,12 * * *'  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4 
      with:
        fetch-depth: 0
    
    - name: Update EPG Files
      run: |
        # 删除旧文件
        rm -f e.xml e.xml.gz
        
        # 定义EPG源列表（按优先级排序，可自行增减）
        EPG_SOURCES=(
          "https://epg.112114.xyz/pp.xml"
          "https://epg.zsdc.eu.org/t.xml"
          "http://e.erw.cc/all.xml"
        )
        
        # 循环尝试下载，直到成功或所有源都失败
        DOWNLOAD_SUCCESS=0
        for SOURCE in "${EPG_SOURCES[@]}"; do
          echo "尝试下载EPG源: $SOURCE"
          # wget参数说明：
          # -q 静默模式 -T 超时时间10秒 -O 输出文件 -t 重试2次
          wget -q -T 20 -O e.xml "$SOURCE" -t 2
          
          # 检查下载是否成功且文件非空
          if [ $? -eq 0 ] && [ -s e.xml ]; then
            echo "成功下载EPG源: $SOURCE"
            DOWNLOAD_SUCCESS=1
            break  # 成功则跳出循环
          else
            echo "EPG源 $SOURCE 下载失败或文件为空，尝试下一个源"
            rm -f e.xml  # 删除失败的空文件
          fi
        done
        
        # 所有源都失败时终止任务
        if [ $DOWNLOAD_SUCCESS -eq 0 ]; then
          echo "所有EPG源下载失败，任务终止"
          exit 1
        fi
        
        # 检查文件是否非空，避免提交空文件
        if [ ! -s e.xml ]; then
          echo "下载的EPG文件为空，任务终止"
          exit 1
        fi
        
        # 压缩文件
        gzip -c e.xml > e.xml.gz
        
        # 配置git用户信息
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 新增：添加文件到暂存区
        git add e.xml e.xml.gz
        
        # 新增：检查是否有变更，无变更则跳过提交（核心修复）
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        # 提交更新
        git commit -m "EPG Update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S') (CST)"
    
    - name: Push changes
      run: |
        git pull --rebase origin main || true
        git push origin main
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
