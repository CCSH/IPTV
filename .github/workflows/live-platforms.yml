name: Live Platforms
on:
  schedule:
    - cron: '0 */2 * * *'        # 每2小时触发（UTC）
  workflow_dispatch:             # 手动触发

jobs:
  merge-m3u:
    runs-on: ubuntu-latest
    env:
      MERGED_M3U: "live_platforms.m3u" # 合并后的最终合集文件名
      TIMEOUT: 15 # 下载超时（秒）
      RETRY: 3    # 下载重试次数
    steps:
      - uses: actions/checkout@v4

      - name: 下载并合并所有M3U
        run: |
          # 待下载的4个M3U源链接
          M3U_URLS=(
            "https://sub.ottiptv.cc/huyayqk.m3u"
            "https://sub.ottiptv.cc/douyuyqk.m3u"
            "https://sub.ottiptv.cc/bililive.m3u"
            "https://sub.ottiptv.cc/yylunbo.m3u"
          )

          # 通用下载函数：带重试、非空校验，失败不覆盖旧文件
          download() {
            local url=$1 out=$2 tmp=${out}.tmp attempt=1
            rm -f $tmp
            while [ $attempt -le $RETRY ]; do
              if wget -q --timeout=$TIMEOUT "$url" -O $tmp && [ -s $tmp ]; then
                mv $tmp $out
                echo "✅ 下载成功：$out"
                return 0 # 拆分换行，修复日志错乱
              fi
              sleep $attempt && attempt=$((attempt+1))
            done
            rm -f $tmp && echo "⚠️ 下载失败：$out，保留旧文件"
          }

          # 1. 下载所有M3U链接
          echo "📥 开始下载M3U源文件"
          for url in "${M3U_URLS[@]}"; do
            fn=$(basename "$url" | cut -d'?' -f1 | cut -d'&' -f1)
            download "$url" "$fn"
          done

          # 2. 合并所有M3U为单个文件（标准格式+成对去重+过滤空行）
          echo "🔗 开始合并为 ${MERGED_M3U}"
          echo "#EXTM3U" > $MERGED_M3U # M3U播放器标准头
          tmp=$(mktemp)
          for f in *.m3u; do [ -s $f ] && sed '1d' $f | grep -v '^$' >> $tmp; done
          awk 'NR%2==1{line=$0;next} !seen[$0]++{print line"\n"$0}' $tmp >> $MERGED_M3U
          rm -f $tmp

          # 3. 删除其他源M3U，仅保留合并后的最终合集
          rrm -f *.m3u !("${MERGED_M3U}")
          echo "🗑️  已删除源M3U文件，仅保留 ${MERGED_M3U}"

          # 4. Git配置+有变更才提交
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- *.m3u; then
            echo "ℹ️ 无M3U文件变更，跳过提交" && exit 0
          fi
          git add *.m3u
          git commit -m "Live Platforms: auto update - $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') (CST)"

      - name: 推送合并结果到仓库
        run: git push origin ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
