name: Live Platforms
on:
  schedule:
    - cron: '0 */2 * * *'        # 每2小时触发（UTC）
  workflow_dispatch:             # 手动触发

jobs:
  merge-m3u:
    runs-on: ubuntu-latest
    env:
      MERGED_M3U: "live_platforms.m3u" # 仅保留这个合并文件
      TIMEOUT: 15 # 下载超时15秒
      RETRY: 3    # 失败重试3次
    steps:
      - uses: actions/checkout@v4

      - name: 下载并合并所有M3U
        run: |
          set +e # 核心1：关闭严格模式，单个命令失败不终止整体脚本
          # 待下载的3个M3U源链接（注释YY轮播）
          M3U_URLS=(
            "https://sub.ottiptv.cc/huyayqk.m3u"
            "https://sub.ottiptv.cc/douyuyqk.m3u"
            "https://sub.ottiptv.cc/bililive.m3u"
            # "https://sub.ottiptv.cc/yylunbo.m3u"
          )

          # 通用下载函数：加容错，屏蔽错误输出
          download() {
            local url=$1 out=$2 tmp=${out}.tmp attempt=1
            rm -f $tmp 2>/dev/null # 屏蔽文件不存在错误
            while [ $attempt -le $RETRY ]; do
              if wget -q --timeout=$TIMEOUT "$url" -O $tmp 2>/dev/null && [ -s $tmp ]; then
                mv $tmp $out 2>/dev/null
                echo "✅ 下载成功：$out"
                return 0
              fi
              sleep $attempt && attempt=$((attempt+1))
            done
            rm -f $tmp 2>/dev/null && echo "⚠️ 下载失败：$out，保留旧文件"
          }

          # 1. 下载所有M3U链接
          echo "📥 开始下载M3U源文件"
          for url in "${M3U_URLS[@]}"; do
            fn=$(basename "$url" | cut -d'?' -f1 | cut -d'&' -f1)
            download "$url" "$fn"
          done

          # YY轮播相关逻辑，全部注释
          # if [ -s "yylunbo.m3u" ]; then
          #   sed -i 's#https://sub.ottiptv.cc#https://yylunbo.ottiptv.cc#g' yylunbo.m3u
          #   echo "🔧 YY轮播域名替换完成"
          # fi

          # 2. 合并所有M3U为单个文件（全容错改造，解决核心报错）
          echo "🔗 开始合并为 ${MERGED_M3U}"
          echo "#EXTM3U" > "${MERGED_M3U}" 2>/dev/null # 屏蔽写入错误
          tmp=$(mktemp)
          touch "$tmp" # 核心2：确保临时文件一定存在，避免空文件报错
          # 遍历仅处理有内容的M3U，屏蔽所有错误
          for f in *.m3u; do 
            if [ -s "$f" ]; then 
              sed '1d' "$f" | grep -v '^$' >> "$tmp" 2>/dev/null
            fi
          done
          # 有内容才去重，无内容直接跳过，屏蔽awk错误
          [ -s "$tmp" ] && awk 'NR%2==1{line=$0;next} !seen[$0]++{print line"\n"$0}' "$tmp" >> "${MERGED_M3U}" 2>/dev/null
          rm -f "$tmp" 2>/dev/null

          # 3. 删除其他源M3U，仅保留合并后的文件（保留原有写法，加容错）
          find . -maxdepth 1 -name "*.m3u" ! -name "${MERGED_M3U}" -delete 2>/dev/null
          echo "🗑️  已删除源M3U文件，仅保留 ${MERGED_M3U}"

          # 4. Git配置+有变更才提交（保留原有逻辑）
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "${MERGED_M3U}" ] && ! git diff --quiet -- "${MERGED_M3U}"; then
            git add "${MERGED_M3U}"
            git commit -m "Live Platforms: auto update - $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') (CST)"
            echo "✅ 合并文件已提交"
          else
            echo "ℹ️ 无M3U文件变更，跳过提交"
            exit 0 # 正常退出，不标为失败
          fi

      - name: 推送合并结果到仓库
        run: |
          # 容错推送，无内容也不报错
          git push origin ${{ github.ref_name }} 2>/dev/null || echo "ℹ️ 无内容可推送"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
